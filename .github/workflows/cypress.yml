name: QA Enterprise Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:

  # 🔹 1. BUILD / SETUP
  build:
    name: Build & Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

  # 🔹 2. TESTES RÁPIDOS (SMOKE)
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # 🔥 roda só testes críticos
      - name: Run Smoke Tests
        run: npx cypress run --spec "cypress/e2e/smoke/login.cy.js"

  # 🔹 3. TESTES COMPLETOS (PARALELO)
  e2e-tests:
    name: E2E Tests (Parallel)
    runs-on: ubuntu-latest
    needs: smoke-tests

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]  # paralelismo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # 🔥 roda todos testes
      - name: Run Cypress Tests
        run: npx cypress run

      # 🔥 salva evidências
      - name: Upload vídeos
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ matrix.containers }}
          path: cypress/videos

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.containers }}
          path: cypress/screenshots

  # 🔹 4. RELATÓRIO (MOCHAWESOME)
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - name: Gerar relatório
        run: npm run report

      - name: Upload relatório
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.html